apiVersion: apps/v1
kind: Deployment
metadata:
  name: vedrix-frontend
  labels:
    app: vedrix-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vedrix-frontend
  template:
    metadata:
      labels:
        app: vedrix-frontend
    spec:
      containers:
        - name: frontend
          image: vedrix/frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              value: "http://vedrix-backend:8000/api/v1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vedrix-frontend
spec:
  selector:
    app: vedrix-frontend
  ports:
    - port: 80
      targetPort: 5173
  type: LoadBalancer