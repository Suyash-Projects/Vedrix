apiVersion: v1
kind: Secret
metadata:
  name: vedrix-secrets
type: Opaque
stringData:
  # Required - generate with: openssl rand -base64 32
  secret-key: "CHANGE_ME_IN_PRODUCTION"
  database-url: "postgresql://user:password@host:5432/vedrix"
  redis-url: "redis://redis:6379/0"
  groq-api-key: "your-groq-api-key"
  openrouter-api-key: "your-openrouter-key"
  nvidia-api-key: "your-nvidia-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vedrix-config
data:
  environment: "production"
  frontend-url: "https://your-domain.com"
  backend-url: "https://api.your-domain.com"